name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  node-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-digestron
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-digestron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  node-extract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/ts-extract
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/ts-extract/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Smoke test (bad input → ok=false)
        run: |
          result=$(echo '{}' | node src/index.mjs)
          echo "$result"
          echo "$result" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            if (d.ok !== false) { console.error('expected ok=false'); process.exit(1); }
            console.log('smoke test passed');
          "
